<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchiFind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="backdrop-orb orb-one"></div>
    <div class="backdrop-orb orb-two"></div>

    <div class="layout">
      <aside class="panel panel-sidebar">
        <div class="brand-block">
          <h1 class="brand-title"><span class="brand-watchi">Watchi</span><span class="brand-find">Find</span></h1>
          <p class="brand-subtitle">Search movies by genre and release year.</p>
        </div>

        <div class="filter-group">
          <p class="filter-label">Genres</p>
          <details class="genre-dropdown">
            <summary class="genre-dropdown-summary">Select genres</summary>
            <div class="genre-dropdown-content">
              <div id="genre-list"></div>
            </div>
          </details>
        </div>

        <div class="filter-group">
          <p class="filter-label">Year released</p>
          <div id="year-list"></div>
        </div>

        <div class="filter-group">
          <div id="clear-refinements"></div>
        </div>
      </aside>

      <main class="content-area">
        <section class="panel hero-panel">
          <p class="eyebrow">Discover Movies</p>
          <h2 class="hero-title">Find the next movie you'll actually finish</h2>
          <p class="hero-text">Search thousands of titles, filter by genre and year, and open details instantly.</p>
          <div class="search-wrap" id="searchbox"></div>
        </section>

        <div class="panel stats-panel">
          <div id="stats"></div>
        </div>

        <section id="hits"></section>

        <div id="pagination"></div>
      </main>
    </div>
  </div>

  <div id="movie-detail-modal" class="movie-modal">
    <div class="movie-modal-card">
      <button id="movie-detail-close" class="movie-modal-close">×</button>
      <div class="movie-modal-grid">
        <div id="detail-poster" class="movie-modal-poster"></div>
        <div class="movie-modal-content">
          <div>
            <p class="eyebrow">Movie details</p>
            <h2 id="detail-title" class="movie-modal-title"></h2>
            <p id="detail-meta" class="movie-modal-meta"></p>
          </div>
          <p id="detail-genres" class="movie-modal-genres"></p>
          <div id="detail-overview" class="movie-modal-overview"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/algoliasearch@4/dist/algoliasearch.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4"></script>
  <script src="script.js"></script>
</body>
</html>
